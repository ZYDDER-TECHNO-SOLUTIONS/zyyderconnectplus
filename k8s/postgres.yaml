apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sparklex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: sparklex
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sparklex-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_MULTIPLE_DATABASES
          value: "sparklex_auth,sparklex_jobs,sparklex_resumes,sparklex_notifications"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d/init-multiple-dbs.sh
          subPath: init-multiple-dbs.sh
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "sparklex"]
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: postgres-data
        emptyDir: {}
      - name: init-script
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sparklex
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
