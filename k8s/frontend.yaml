apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sparklex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: sparklex-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: VITE_AUTH_API_URL
          value: "http://connect.qhrmpro.com:30081"
        - name: VITE_JOB_API_URL
          value: "http://connect.qhrmpro.com:30082"
        - name: VITE_RESUME_API_URL
          value: "http://connect.qhrmpro.com:30083"
        - name: VITE_NOTIFICATION_API_URL
          value: "http://connect.qhrmpro.com:30084"
        - name: VITE_GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: sparklex-secrets
              key: GOOGLE_CLIENT_ID
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sparklex
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
